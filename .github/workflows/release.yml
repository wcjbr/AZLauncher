name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            archive_name: AZLauncher-${{ github.ref_name }}-win-x64.zip
          - os: ubuntu-latest
            rid: linux-x64
            archive_name: AZLauncher-${{ github.ref_name }}-linux-x64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore AZLauncher.sln

      - name: Publish
        run: >
          dotnet publish AZLauncher/AZLauncher.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:PublishReadyToRun=false
          -o artifacts/${{ matrix.rid }}/publish

      - name: Package Windows build
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path artifacts/${{ matrix.rid }}/publish/* -DestinationPath artifacts/${{ matrix.rid }}/${{ matrix.archive_name }} -Force
          $hash = (Get-FileHash artifacts/${{ matrix.rid }}/${{ matrix.archive_name }} -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path artifacts/${{ matrix.rid }}/${{ matrix.archive_name }}.sha256 -Value "$hash  ${{ matrix.archive_name }}"

      - name: Package Linux build
        if: runner.os == 'Linux'
        shell: bash
        run: |
          tar -C artifacts/${{ matrix.rid }}/publish -czf artifacts/${{ matrix.rid }}/${{ matrix.archive_name }} .
          sha256sum artifacts/${{ matrix.rid }}/${{ matrix.archive_name }} > artifacts/${{ matrix.rid }}/${{ matrix.archive_name }}.sha256

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.rid }}-release
          path: |
            artifacts/${{ matrix.rid }}/${{ matrix.archive_name }}
            artifacts/${{ matrix.rid }}/${{ matrix.archive_name }}.sha256

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: AZLauncher ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release-artifacts/*
